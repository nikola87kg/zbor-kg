query GetNewsArticle($id: UUID!) @auth(level: PUBLIC, insecureReason: "News articles are publicly readable") {
  newsArticle(id: $id) {
    id
    title
    url
    publishedAt
    createdAt
    imageUrl
    summary
    sourceName
  }
}

query ListNewsArticles @auth(level: PUBLIC, insecureReason: "News articles are publicly readable") {
  newsArticles(orderBy: { publishedAt: DESC }) {
    id
    title
    url
    publishedAt
    createdAt
    imageUrl
    summary
    sourceName
  }
}

query ListUserNewsPreferences @auth(level: USER) {
  userNewsPreferences(where: { authUid: { eq_expr: "auth.uid" } }) {
    newsArticleId
    isRead
    isFavorite
  }
}

mutation CreateNewsArticle(
  $title: String!
  $url: String!
  $publishedAt: Timestamp!
  $imageUrl: String
  $summary: String
  $sourceName: String
) @auth(level: USER, insecureReason: "Any authenticated user can submit news articles") {
  newsArticle_insert(data: {
    title: $title
    url: $url
    publishedAt: $publishedAt
    createdAt_expr: "request.time"
    imageUrl: $imageUrl
    summary: $summary
    sourceName: $sourceName
  })
}

mutation UpdateNewsArticle(
  $id: UUID!
  $title: String!
  $url: String!
  $publishedAt: Timestamp!
  $imageUrl: String
  $summary: String
  $sourceName: String
) @auth(level: USER, insecureReason: "Any authenticated user can update news articles") {
  newsArticle_update(id: $id, data: {
    title: $title
    url: $url
    publishedAt: $publishedAt
    imageUrl: $imageUrl
    summary: $summary
    sourceName: $sourceName
  })
}

mutation DeleteNewsArticle($id: UUID!) @auth(level: USER, insecureReason: "Any authenticated user can delete news articles") {
  newsArticle_delete(id: $id)
}

mutation SetNewsPreference(
  $newsArticleId: UUID!
  $isFavorite: Boolean!
  $isRead: Boolean!
) @auth(level: USER) {
  userNewsPreference_upsert(data: {
    authUid_expr: "auth.uid"
    newsArticleId: $newsArticleId
    isFavorite: $isFavorite
    isRead: $isRead
    createdAt_expr: "request.time"
  })
}
