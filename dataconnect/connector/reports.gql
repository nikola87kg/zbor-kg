mutation SubmitReport(
  $name: String!
  $address: String!
  $description: String!
  $imageUrl: String
) @auth(level: PUBLIC, insecureReason: "Anyone can submit a problem report") {
  problemReport_insert(data: {
    name: $name
    address: $address
    description: $description
    imageUrl: $imageUrl
    status: "На разматрању"
    createdAt_expr: "request.time"
  })
}

mutation UpdateReportStatus(
  $id: UUID!
  $status: String!
) @auth(level: USER) {
  problemReport_update(id: $id, data: { status: $status })
}

query ListReports @auth(level: PUBLIC) {
  problemReports(orderBy: { createdAt: DESC }) {
    id
    name
    address
    description
    imageUrl
    status
    createdAt
  }
}
