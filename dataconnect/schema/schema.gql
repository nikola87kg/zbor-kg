type User @table {
  displayName: String!
  createdAt: Timestamp!
  email: String
  photoUrl: String
}

type NewsArticle @table {
  title: String!
  publishedAt: Timestamp!
  createdAt: Timestamp!
  imageUrl: String
  summary: String
}

type Affair @table {
  title: String!
  publishedAt: Timestamp!
  createdAt: Timestamp!
  content: String
  imageUrl: String
}

type Action @table {
  title: String!
  date: Timestamp!
  createdAt: Timestamp!
  description: String
  location: String
  imageUrl: String
}

type CalendarEntryType @table {
  name: String!
}

type CalendarEntry @table {
  authUid: String!
  title: String!
  startTime: Timestamp!
  entryType: CalendarEntryType!
  createdAt: Timestamp!
  description: String
  endTime: Timestamp
  location: String
  isAllDay: Boolean
  reminderTime: Timestamp
}

type ProblemReport @table {
  name: String!
  address: String!
  description: String!
  imageUrl: String
  status: String
  createdAt: Timestamp!
}

type UserRole @table(key: "authUid") {
  authUid: String!
  role: String!
}

type UserNewsPreference @table(key: ["authUid", "newsArticle"]) {
  authUid: String!
  newsArticle: NewsArticle!
  createdAt: Timestamp!
  isRead: Boolean
  isFavorite: Boolean
}
