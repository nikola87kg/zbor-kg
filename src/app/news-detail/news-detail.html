<div class="detail-container">
  <button mat-button class="back-btn" (click)="goBack()">
    <mat-icon>arrow_back</mat-icon>
    Назад на вести
  </button>

  @if (loading()) {
    <div class="skeleton-detail">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line" style="width:28%"></div>
        <div class="skeleton skeleton-line skeleton-title" style="width:82%"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line" style="width:88%"></div>
        <div class="skeleton skeleton-line" style="width:72%"></div>
        <div class="skeleton skeleton-line" style="width:60%"></div>
      </div>
    </div>
  } @else if (!article()) {
    <p class="state-msg">Вест није пронађена.</p>
  } @else {
    <article class="detail-article">
      <img [appImgFallback]="article()!.imageUrl" class="detail-image"
           [alt]="article()!.title"
           [style.view-transition-name]="'news-' + article()!.id">

      <div class="detail-body">
        <div class="detail-meta">
          <span class="date">{{ article()!.publishedAt | date:'dd.MM.yyyy' }}</span>
        </div>

        <h1 class="detail-title">{{ article()!.title }}</h1>

        @if (content()) {
          <div class="detail-content" [innerHTML]="content()"></div>
        }

      </div>
    </article>
  }
</div>
